<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Grocerly Supermarket</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="login-wrapper">

    <div class="login-card">
        <div class="login-logo">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
            <span>Grocerly</span>
        </div>
        <p class="login-subtitle">Supermarket Billing Workspace Sign In</p>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group" style="text-align: left;">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="e.g. admin@grocerly.com" required>
            </div>
            
            <div class="form-group" style="text-align: left; margin-bottom: 24px;">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">Sign In</button>
        </form>
    </div>

    <!-- Notification Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/app.js"></script>
    <script>
        // Redirect to index if already logged in
        if (localStorage.getItem("isLoggedIn") === "true") {
            window.location.href = "index.html";
        }

        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById("email").value.trim();
            const pass = document.getElementById("password").value;

            if (pass === "admin") {
                localStorage.setItem("isLoggedIn", "true");
                showToast("Login successful! Redirecting...");
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1000);
            } else {
                showToast("Invalid email or password!", "error");
            }
        }
    </script>
</body>
</html>
