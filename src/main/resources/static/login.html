<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Bill Bee Supermarket</title>
    <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body class="login-wrapper">

    <div class="login-card">
        <div class="login-logo"
            style="margin-bottom: 24px; display: flex; flex-direction: column; align-items: center;">
            <img src="images/billbeelogo.png" alt="Bill Bee Logo"
                style="width:80px; height:80px; object-fit:cover; border-radius:50%; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <span style="font-size: 28px; margin-top: 12px; margin-left: 0;">Bill Bee</span>
        </div>
        <p class="login-subtitle">Supermarket Billing Workspace Sign In</p>

        <form id="loginForm" action="/login" method="post">
            <div class="form-group" style="text-align: left;">
                <label for="username">Email Address</label>
                <input type="email" id="username" name="username" class="form-control"
                    placeholder="e.g. sample@gmail.com" required>
            </div>

            <div class="form-group" style="text-align: left; margin-bottom: 24px;">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••"
                    required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">Sign In</button>
        </form>
    </div>

    <!-- Notification Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('error')) {
                showToast("Invalid email or password!", "error");
            }
            if (urlParams.has('logout')) {
                showToast("You have been logged out successfully.");
            }
        });
    </script>
</body>

</html>
